<!DOCTYPE html>
<html>
<meta charset="UTF-8">
<link rel="stylesheet" href="map.css">
<script
  src="https://code.jquery.com/jquery-2.2.4.min.js"
  integrity="sha384-rY/jv8mMhqDabXSo+UCggqKtdmBfd3qC2/KvyTDNQ6PcUJXaxK1tMepoQda4g5vB"
  crossorigin="anonymous"></script>

  <script src="map.js"></script>
  <script src=""></script>


<head>
  <title>【セタガクエスト】マップ</title></head>
<body>
    <div class="topcontainer">
        <div class="topsquare">
            <br>
            <div id="top">
                <img
                  src="https://cdn.discordapp.com/icons/1101399573991268374/a_c3ede8a7240af692d46e1d786b13dbb8.gif?size=1024"
                  width="8%">
                <img src="image/title.png" width="50%">
                <div id="topTitle" style="display: inline;">校内マップ</div><br>
                <div class="longUnderLine"></div><br><br>
            </div>
        </div>
    </div>

    <div id="notCustomer">
        <span style="font-size: 200%;">
            <br>
            <div id="notCTM">
                おかえりなさい！<br>
                残念ながらセタガクエストに参加していないと地図を見ることはできません<br>
                4Fの教室にきて手を貸してください！
                <h3 id="countDownNCM">読み込み中...</h3>
            </div>
        </span>
    </div>
    <div id="helloDiv" style="display:hide;">
        <br>
        <h2 id="countDown">読み込み中...</h2>
        <h2 id="hello"></h2>
        <table id="goToOtherURL-nick">
            <tr>
                <td>
                    <div id="goToURL">
                        <a href="http://219.102.171.100:25565/inventory.html">インベントリを見る</a>
                    </div>
                </td>
            </tr>
        </table>
    </div>

    <div id="map_layer">
        <input type="radio" name="tab_name" id="tab_1" checked>
        <label class="tab_class" for="tab_1">2F</label>
            <div class="content_class">
                <p class="map_setumei">2階マップを表示中</p>
            <div class="relative">
                <img src="image/map_2f_test.png" class="mainmap"; id="map_2f_main">
            </div>    
            </div>
        <input type="radio" name="tab_name" id="tab_2" checked>
        <label class="tab_class" for="tab_2">3F</label>
            <div class="content_class">
                <p class="map_setumei">3階マップを表示中</p>
            <div class="relative">
                <img src="image/map_2f_test.png" class="mainmap"; id="map_3f_main">
            </div>    
            </div>
        <input type="radio" name="tab_name" id="tab_3" checked>
        <label class="tab_class" for="tab_3">4F</label>
            <div class="content_class">
                <p class="map_setumei">4階マップを表示中</p>
            <div class="relative">
                <img src="image/map_2f_test.png" class="mainmap"; id="map_4f_main">
                <!-- 4階祠1 -->
                <a class="js-modal-open" href="" data-target="modal01"><img src="image/hokoratest_normal.png" id="map_4f_1" class="absolute markers"></a>
                <a class="js-modal-open" href="" data-target="modal02"><img src="image/hokoratest_normal.png" id="map_4f_2" class="absolute markers"></a>
                <a class="js-modal-open" href="" data-target="modal03"><img src="image/hokoratest_normal.png" id="map_4f_3" class="absolute markers"></a>
                <a class="js-modal-open" href="" data-target="modal04"><img src="image/hokoratest_normal.png" id="map_4f_4" class="absolute markers"></a>
            </div>
            <div id="modal01" class="modal js-modal">
                <div class="modal__bg js-modal-close"></div>
                <div class="modal__content">
                    <!-- 4f_1 -->
                    <p id="modal_text_4f_1"><br>定義されていません</p>
                    <a class="js-modal-close" href="">閉じる</a>
                </div><!--modal__inner-->
            </div><!--modal-->
            <div id="modal02" class="modal js-modal">
                <div class="modal__bg js-modal-close"></div>
                <div class="modal__content">
                    <!-- 4f_2 -->
                    <p id="modal_text_4f_2">定義されていません</p>
                    <a class="js-modal-close" href="">閉じる</a>
                </div><!--modal__inner-->
            </div><!--modal-->
            <div id="modal03" class="modal js-modal">
                <div class="modal__bg js-modal-close"></div>
                <div class="modal__content">
                    <!-- 4f_3 -->
                    <p id="modal_text_4f_3">定義されていません</p>
                    <a class="js-modal-close" href="">閉じる</a>
                </div><!--modal__inner-->
            </div><!--modal-->
            <div id="modal04" class="modal js-modal">
                <div class="modal__bg js-modal-close"></div>
                <div class="modal__content">
                    <!-- 4f_4 -->
                    <p id="modal_text_4f_4">定義されていません</p>
                    <a class="js-modal-close" href="">閉じる</a>
                </div><!--modal__inner-->

            </div>
                <br>
                <div id="achieved_4f">
                    現在攻略完了した祠の数：
                <div id="achieved_numbers_4f">
                </div>
            </div>    
            </div>
    </div>

</body>
</html>
